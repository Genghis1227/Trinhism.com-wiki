{{ $header := print "_header." .Lang }}
{{ range where (where .Site.Pages "File" "!=" nil) "File.BaseFileName" $header }}
  {{ .Content }} 
{{else}}
  {{ if .Site.GetPage "page" "_header.md" }}
    {{(.Site.GetPage "page" "_header.md").Content}}
  {{else}}
    <a class="baselink" href="{{ "/" | relLangURL }}">{{.Site.Title}}</a>
  {{end}}
{{end}}
