<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.description }}{{ . }}{{ end }}{{ end }}">
{{ with .Site.Params.author }}<meta name="author" content="{{ . }}">{{ end }}

<!-- Initial Dark/Light Mode state check to prevent layout flash -->
<script>
  (function() {
    var savedTheme = localStorage.getItem('theme');
    // Default to dark mode to match trinhism.com
    var theme = savedTheme || 'dark';
    if (theme === 'dark') {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  })();
</script>

<!-- Link custom Trinhism stylesheet and theme toggle script -->
<link rel="stylesheet" href="{{ "css/trinhism.css" | relURL }}">
<script src="{{ "js/theme-toggle.js" | relURL }}" defer></script>

<!-- Favicon and Apple Touch Icon matching the main site -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ "apple-touch-icon.png" | relURL }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ "images/favicon.png" | relURL }}">
